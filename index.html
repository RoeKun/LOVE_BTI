<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>恋爱动物人格 | 你在爱情里是什么动物？</title>
  <meta name="description" content="一段沉浸式的恋爱故事，在故事中发现你的恋爱动物人格。">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            rose: { 50:'#fff1f2',100:'#ffe4e6',200:'#fecdd3',300:'#fda4af',400:'#fb7185',500:'#f43f5e',600:'#e11d48',700:'#be123c' },
            love: { light:'#fdf2f8', DEFAULT:'#ec4899', dark:'#9d174d' },
          },
          fontFamily: {
            display: ['"Noto Serif SC"','serif'],
            body: ['"Noto Sans SC"','sans-serif'],
            story: ['"Noto Serif SC"','"Georgia"','serif']
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body class="font-body min-h-screen overflow-x-hidden bg-gray-950 text-white">

  <!-- 加载画面 -->
  <div id="loader" class="fixed inset-0 z-[100] flex items-center justify-center bg-gray-950">
    <div class="text-center">
      <div class="loader-ring mb-6">
        <div class="loader-ring-inner"></div>
        <span class="text-4xl absolute inset-0 flex items-center justify-center">📖</span>
      </div>
      <p class="text-white/40 text-sm tracking-widest animate-pulse">正在加载场景资源...</p>
      <div class="w-48 h-1 bg-white/10 rounded-full mx-auto mt-4 overflow-hidden">
        <div id="load-progress" class="h-full bg-gradient-to-r from-rose-500 to-purple-500 rounded-full transition-all duration-300" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- ===== 首页 ===== -->
  <section id="page-home" class="relative min-h-screen flex flex-col z-10">
    <!-- 首页背景 -->
    <div id="home-bg" class="absolute inset-0 z-0">
      <div class="absolute inset-0 bg-gradient-to-b from-gray-950/60 via-gray-950/30 to-gray-950 z-10"></div>
    </div>
    <div class="flex-1 flex items-center justify-center px-4 py-8 relative z-20">
      <div class="max-w-lg w-full text-center">
        <div class="mb-8 opacity-0 animate-home-fadein" style="animation-delay:0.3s">
          <span class="text-6xl sm:text-7xl block mb-2" style="filter:drop-shadow(0 0 30px rgba(244,63,94,0.3))">📖</span>
          <div class="flex justify-center gap-2 text-2xl mt-3 opacity-60">
            <span>🦊</span><span>🐱</span><span>🐺</span><span>🦁</span><span>🐰</span><span>🦢</span>
          </div>
        </div>
        <h1 class="font-display font-black text-3xl sm:text-4xl md:text-5xl text-transparent bg-clip-text bg-gradient-to-r from-rose-400 via-pink-400 to-purple-400 mb-4 leading-tight opacity-0 animate-home-fadein" style="animation-delay:0.6s">
          你在爱情里<br>是什么动物？
        </h1>
        <p class="text-white/40 text-sm sm:text-base max-w-md mx-auto mb-3 leading-relaxed opacity-0 animate-home-fadein" style="animation-delay:0.9s">
          这不是一份问卷，而是一段属于你的故事。<br>
          <span class="text-rose-400/70">在场景中做出选择，发现你的恋爱人格。</span>
        </p>
        <p class="text-white/25 text-xs max-w-sm mx-auto mb-10 opacity-0 animate-home-fadein" style="animation-delay:1.1s">
          下班路上，街角的便利店，一次偶然的重逢……<br>故事会自动播放，你只需要沉浸其中。
        </p>
        <button id="btn-start" class="group relative inline-flex items-center gap-3 px-10 py-4 bg-gradient-to-r from-rose-500 via-pink-500 to-purple-500 text-white font-bold text-base rounded-full shadow-2xl shadow-rose-500/20 hover:shadow-rose-500/40 hover:-translate-y-1 active:translate-y-0 transition-all duration-300 overflow-hidden opacity-0 animate-home-fadein" style="animation-delay:1.3s">
          <span class="relative z-10">开始故事</span>
          <i class="fa-solid fa-play relative z-10 text-sm group-hover:scale-125 transition-transform"></i>
          <div class="absolute inset-0 bg-gradient-to-r from-rose-600 via-pink-600 to-purple-600 opacity-0 group-hover:opacity-100 transition-opacity"></div>
        </button>
        <p class="text-xs text-white/20 mt-5 opacity-0 animate-home-fadein" style="animation-delay:1.5s">🔒 完全匿名 · 约4分钟 · 自动播放</p>
      </div>
    </div>
  </section>

  <!-- ===== 场景播放器 ===== -->
  <section id="page-scene" class="fixed inset-0 z-20 hidden">
    <!-- 场景背景层 -->
    <div id="scene-bg-layer" class="absolute inset-0 z-0">
      <img id="scene-bg-img" class="absolute inset-0 w-full h-full object-cover" src="" alt="">
      <img id="scene-bg-img-next" class="absolute inset-0 w-full h-full object-cover opacity-0" src="" alt="">
      <!-- 光效叠加 -->
      <div id="scene-light-overlay" class="absolute inset-0 z-5 pointer-events-none"></div>
      <!-- 暗角 -->
      <div class="absolute inset-0 z-6" style="background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.5) 100%)"></div>
      <!-- 底部渐变（让文字可读） -->
      <div class="absolute bottom-0 left-0 right-0 h-2/3 z-7" style="background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.4) 50%,transparent 100%)"></div>
    </div>

    <!-- 粒子层 -->
    <canvas id="scene-particles" class="absolute inset-0 z-8 pointer-events-none"></canvas>

    <!-- 顶部UI -->
    <div class="absolute top-0 left-0 right-0 z-30 safe-area-top">
      <div class="flex items-center justify-between px-4 py-3">
        <div id="chapter-label" class="text-white/40 text-xs font-story italic tracking-wider"></div>
        <div id="scene-progress-dots" class="flex items-center gap-1"></div>
      </div>
    </div>

    <!-- 叙事文字层 -->
    <div id="narration-layer" class="absolute bottom-0 left-0 right-0 z-20 px-4 pb-8 hidden">
      <div class="max-w-lg mx-auto">
        <div id="narration-text" class="font-story text-base sm:text-lg leading-loose text-white/90"></div>
      </div>
    </div>

    <!-- 对话层 -->
    <div id="dialogue-layer" class="absolute bottom-0 left-0 right-0 z-20 hidden">
      <!-- 对话框 -->
      <div class="max-w-lg mx-auto px-4 pb-4">
        <!-- 说话者 -->
        <div id="dialogue-speaker" class="flex items-center gap-2 mb-2 hidden">
          <span id="speaker-emoji" class="text-xl"></span>
          <span id="speaker-name" class="text-sm font-bold text-white/70"></span>
        </div>
        <!-- 对话文字 -->
        <div id="dialogue-box" class="dialogue-bubble">
          <div id="dialogue-text" class="font-story text-base leading-relaxed text-white/85"></div>
        </div>
        <!-- 选项区域 -->
        <div id="dialogue-choices" class="mt-3 space-y-2 hidden"></div>
        <!-- 反馈文字 -->
        <div id="dialogue-reaction" class="mt-3 hidden">
          <div class="reaction-bubble font-story text-sm leading-relaxed text-rose-300/80 italic"></div>
        </div>
      </div>
    </div>

    <!-- 场景点击交互层 -->
    <div id="action-layer" class="absolute inset-0 z-15 hidden">
      <!-- 提示文字 -->
      <div id="action-prompt" class="absolute bottom-0 left-0 right-0 px-4 pb-6 z-20">
        <div class="max-w-lg mx-auto">
          <div class="font-story text-sm leading-relaxed text-white/70 text-center"></div>
        </div>
      </div>
      <!-- 热区容器 -->
      <div id="action-hotspots" class="absolute inset-0 z-10"></div>
      <!-- 反馈 -->
      <div id="action-reaction" class="absolute bottom-0 left-0 right-0 px-4 pb-6 z-20 hidden">
        <div class="max-w-lg mx-auto">
          <div class="reaction-bubble font-story text-sm leading-relaxed text-rose-300/80 italic text-center"></div>
        </div>
      </div>
    </div>

    <!-- 章节过渡层 -->
    <div id="transition-layer" class="absolute inset-0 z-40 flex items-center justify-center hidden bg-gray-950">
      <div class="text-center">
        <div id="transition-text" class="font-display font-black text-3xl sm:text-4xl text-white/90 mb-2"></div>
        <div id="transition-subtext" class="text-white/40 text-sm font-story italic tracking-wider"></div>
      </div>
    </div>
  </section>

  <!-- ===== 计算中 ===== -->
  <section id="page-calculating" class="fixed inset-0 z-30 hidden flex-col items-center justify-center bg-gray-950">
    <div class="text-center px-6">
      <div class="relative w-32 h-32 mx-auto mb-8">
        <svg class="w-full h-full animate-spin" style="animation-duration:3s" viewBox="0 0 128 128">
          <circle cx="64" cy="64" r="56" fill="none" stroke="rgba(244,63,94,0.1)" stroke-width="3"/>
          <circle cx="64" cy="64" r="56" fill="none" stroke="url(#calcGrad)" stroke-width="3" stroke-dasharray="88 264" stroke-linecap="round"/>
          <defs><linearGradient id="calcGrad"><stop offset="0%" stop-color="#f43f5e"/><stop offset="100%" stop-color="#a855f7"/></linearGradient></defs>
        </svg>
        <div class="absolute inset-0 flex items-center justify-center text-4xl">📖</div>
      </div>
      <h2 class="font-display font-bold text-xl text-white mb-4">正在解读你的故事...</h2>
      <div id="calc-steps" class="text-white/40 text-sm space-y-2"></div>
    </div>
  </section>

  <!-- ===== 结果页 ===== -->
  <section id="page-result" class="relative min-h-screen z-10 hidden">
    <div id="result-container" class="max-w-2xl mx-auto px-4 py-8"></div>
  </section>

  <!-- 页脚 -->
  <footer id="app-footer" class="relative z-10 text-center py-6 text-sm text-gray-600 hidden">
    <p>由 <a href="https://with.woa.com/" style="color: #8A2BE2;" target="_blank">With</a> 通过自然语言生成</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
